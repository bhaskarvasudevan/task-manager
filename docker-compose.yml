version: '3.8'

networks:
  task-network:
    driver: bridge

services:
  task-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: task-mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    networks:
      - task-network
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped

  task-redis:
    image: redis:7-alpine
    container_name: task-redis
    ports:
      - "6379:6379"
    networks:
      - task-network
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  task-backend:
    image: ghcr.io/bhaskarvasudevan/task-backend:latest
    container_name: task-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://task-mssql:1433;databaseName=taskmanager;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Passw0rd
      - SPRING_REDIS_HOST=task-redis
      - SPRING_REDIS_PORT=6379
    ports:
      - "8081:8080"
    networks:
      - task-network
    depends_on:
      - task-mssql
      - task-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  task-gateway:
    image: ghcr.io/bhaskarvasudevan/task-gateway:latest
    container_name: task-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - BACKEND_SERVICE_URL=http://task-backend:8080
    ports:
      - "8080:8080"
    networks:
      - task-network
    depends_on:
      - task-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  task-frontend:
    image: ghcr.io/bhaskarvasudevan/task-frontend:latest
    container_name: task-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    ports:
      - "80:80"
    networks:
      - task-network
    depends_on:
      - task-gateway
    restart: unless-stopped

volumes:
  mssql-data:
  redis-data:
EOF
