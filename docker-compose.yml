cd ~/task-manager  # or wherever your repo is

cat > docker-compose.yml << 'EOF'
services:
  task-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: task-mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - task-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  task-redis:
    image: redis:7-alpine
    container_name: task-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - task-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  task-backend:
    image: ${DOCKER_REGISTRY}/task-backend:${IMAGE_TAG:-latest}
    container_name: task-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://task-mssql:1433;databaseName=taskmanager;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Passw0rd
      - SPRING_REDIS_HOST=task-redis
      - SPRING_REDIS_PORT=6379
    ports:
      - "8081:8081"
    networks:
      - task-network
    depends_on:
      task-mssql:
        condition: service_healthy
      task-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  task-gateway:
    image: ${DOCKER_REGISTRY}/task-gateway:${IMAGE_TAG:-latest}
    container_name: task-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - BACKEND_SERVICE_URL=http://task-backend:8081
    ports:
      - "8080:8080"
    networks:
      - task-network
    depends_on:
      task-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  task-frontend:
    image: ${DOCKER_REGISTRY}/task-frontend:${IMAGE_TAG:-latest}
    container_name: task-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    ports:
      - "80:80"
    networks:
      - task-network
    depends_on:
      - task-gateway
    restart: unless-stopped

networks:
  task-network:
    driver: bridge

volumes:
  mssql-data:
  redis-data:
EOF
