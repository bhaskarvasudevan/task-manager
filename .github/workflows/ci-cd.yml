deploy:
  name: Deploy to Rocky Linux 9 (Hetzner VM)
  runs-on: ubuntu-latest
  needs: docker-build-push
  if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    # NEW: Copy docker-compose.yml to server
    - name: Copy docker-compose.yml to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "docker-compose.yml"
        target: "/opt/task-manager/"
        
    - name: Deploy to Rocky Linux server via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          # Navigate to deployment directory
          cd /opt/task-manager || exit 1
          
          # Create .env if not exists
          if [ ! -f .env ]; then
            echo "Creating .env file..."
            cat > .env << 'ENVEOF'
            DOCKER_REGISTRY=${{ secrets.DOCKER_REGISTRY }}
            IMAGE_TAG=latest
            ENVEOF
          fi
          
          # Set environment variables
          export DOCKER_REGISTRY=${{ secrets.DOCKER_REGISTRY }}
          export IMAGE_TAG=latest
          
          # Login to GitHub Container Registry
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ghcr.io -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          
          # Pull latest images
          docker compose pull
          
          # Stop and remove old containers
          docker compose down
          
          # Start new containers
          docker compose up -d
          
          # Wait for services to be healthy
          echo "Waiting for services to start..."
          sleep 15
          
          # Show running containers
          docker compose ps
          
          # Show logs (last 50 lines)
          docker compose logs --tail=50
          
          echo "Deployment completed successfully!"
