deploy:
  name: Deploy to Rocky Linux 9 (Hetzner VM)
  runs-on: ubuntu-latest
  needs: docker-build-push
  if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy deployment files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: |
          docker-compose.yml
          .env
          nginx/**
          scripts/**
        target: /opt/task-manager
        overwrite: true
        strip_components: 0

    - name: Deploy application
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e

          echo "=========================================="
          echo "Starting deployment"
          echo "=========================================="

          mkdir -p /opt/task-manager
          cd /opt/task-manager

          echo ""
          echo "Current docker-compose.yml checksum:"
          sha256sum docker-compose.yml || true

          echo ""
          echo "Docker Compose effective configuration:"
          docker compose config

          echo ""
          echo "Setting environment variables..."
          export DOCKER_REGISTRY=${{ secrets.DOCKER_REGISTRY }}
          export IMAGE_TAG=${{ github.sha }}

          echo ""
          echo "Logging into Docker registry..."
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY }} \
            -u ${{ secrets.DOCKER_USERNAME }} \
            --password-stdin

          echo ""
          echo "Pulling latest images..."
          docker compose pull

          echo ""
          echo "Stopping old containers..."
          docker compose down --remove-orphans

          echo ""
          echo "Removing dangling resources..."
          docker container prune -f || true
          docker image prune -f || true

          echo ""
          echo "Starting containers..."
          docker compose up -d

          echo ""
          echo "Waiting for services..."
          sleep 20

          echo ""
          echo "Container status:"
          docker compose ps

          echo ""
          echo "Published ports:"
          docker ps --format "table {{.Names}}\t{{.Ports}}"

          echo ""
          echo "Checking Redis exposure..."
          if ss -tulpn | grep -q ':6379'; then
            echo "WARNING: Redis still exposed!"
            ss -tulpn | grep 6379 || true
          else
            echo "✓ Redis not publicly exposed"
          fi

          echo ""
          echo "Checking MSSQL exposure..."
          if ss -tulpn | grep -q ':1433'; then
            echo "WARNING: MSSQL still exposed!"
            ss -tulpn | grep 1433 || true
          else
            echo "✓ MSSQL not publicly exposed"
          fi

          echo ""
          echo "Frontend health check..."
          curl -I http://localhost:80 || true

          echo ""
          echo "Gateway health check..."
          curl -I http://localhost:8081 || true

          echo ""
          echo "Deployment completed successfully"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date)"

          docker logout ${{ secrets.DOCKER_REGISTRY }} || true

    - name: Deployment Summary
      if: always()
      run: |
        echo "### Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
