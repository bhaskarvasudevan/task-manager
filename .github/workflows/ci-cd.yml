name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]

  pull_request:
    branches: [ main ]

  workflow_dispatch:

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -DskipTests

      - name: Run tests
        working-directory: ./backend
        run: mvn test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  build-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./api-gateway
        run: mvn clean package -DskipTests

      - name: Run tests
        working-directory: ./api-gateway
        run: mvn test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: api-gateway/target/*.jar
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  docker-build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-gateway, build-frontend]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/task-backend:latest
            ${{ secrets.DOCKER_REGISTRY }}/task-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/task-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/task-backend:buildcache,mode=max
          build-args: |
            JAVA_VERSION=21

      - name: Build and push Gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/task-gateway:latest
            ${{ secrets.DOCKER_REGISTRY }}/task-gateway:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/task-gateway:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/task-gateway:buildcache,mode=max
          build-args: |
            JAVA_VERSION=21

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/task-frontend:latest
            ${{ secrets.DOCKER_REGISTRY }}/task-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/task-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/task-frontend:buildcache,mode=max

  deploy:
    name: Deploy to Rocky Linux 9 (Hetzner VM)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: |
            docker-compose.yml
            .env
            nginx/**
            scripts/**
          target: /opt/task-manager
          overwrite: true
          strip_components: 0

      - name: Deploy to Rocky Linux server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            echo "=========================================="
            echo "Starting deployment on Rocky Linux 9"
            echo "=========================================="

            mkdir -p /opt/task-manager

            cd /opt/task-manager

            echo ""
            echo "docker-compose.yml checksum:"
            sha256sum docker-compose.yml || true

            echo ""
            echo "Effective Docker Compose Configuration:"
            docker compose config

            echo ""
            echo "Setting environment variables..."
            export DOCKER_REGISTRY=${{ secrets.DOCKER_REGISTRY }}
            export IMAGE_TAG=${{ github.sha }}

            echo ""
            echo "Logging into Docker registry..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY }} \
              -u ${{ secrets.DOCKER_USERNAME }} \
              --password-stdin

            echo ""
            echo "Pulling latest images..."
            docker compose pull

            echo ""
            echo "Stopping old containers..."
            docker compose down --remove-orphans || true

            echo ""
            echo "Cleaning up old resources..."
            docker container prune -f || true
            docker network prune -f || true

            echo ""
            echo "Starting containers..."
            docker compose up -d

            echo ""
            echo "Waiting for services..."
            sleep 20

            echo ""
            echo "Container status:"
            docker compose ps

            echo ""
            echo "Published ports:"
            docker ps --format "table {{.Names}}\t{{.Ports}}"

            echo ""
            echo "Checking Redis exposure..."
            if ss -tulpn | grep -q ':6379'; then
              echo "WARNING: Redis still listening on port 6379"
              ss -tulpn | grep 6379 || true
            else
              echo "✓ Redis is NOT publicly exposed"
            fi

            echo ""
            echo "Checking MSSQL exposure..."
            if ss -tulpn | grep -q ':1433'; then
              echo "WARNING: MSSQL still listening on port 1433"
              ss -tulpn | grep 1433 || true
            else
              echo "✓ MSSQL is NOT publicly exposed"
            fi

            echo ""
            echo "Resource Usage:"
            docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}"

            echo ""
            echo "Cleaning up old Docker images..."
            docker image prune -af --filter "until=72h" || true

            echo ""
            echo "Docker Disk Usage:"
            docker system df

            echo ""
            echo "Verifying application health..."
            sleep 5

            if curl -f -s -o /dev/null -w "%{http_code}" http://localhost:80 | grep -q "200\|301\|302"; then
              echo "✓ Frontend is accessible"
            else
              echo "✗ WARNING: Frontend may not be accessible"
            fi

            if curl -f -s -o /dev/null -w "%{http_code}" http://localhost:8081 | grep -q "200\|404"; then
              echo "✓ API Gateway is accessible"
            else
              echo "✗ WARNING: API Gateway may not be accessible"
            fi

            if curl -f -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/tasks | grep -q "200"; then
              echo "✓ Backend API is accessible"
            else
              echo "✗ WARNING: Backend API may not be accessible"
            fi

            echo ""
            echo "Deployment completed successfully!"
            echo "Commit: ${{ github.sha }}"
            echo "Time: $(date)"

            docker logout ${{ secrets.DOCKER_REGISTRY }} || true

      - name: Deployment Summary
        if: always()
        run: |
          echo "### Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server**: Rocky Linux 9" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
